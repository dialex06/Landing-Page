<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Shopee Mini</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>🛍️ Shopee Mini</h1>
</header>

<div class="container">

  <aside class="sidebar">
    <h3>Danh mục</h3>
    <ul>
      <li>Tất cả</li>
      <li>Áo</li>
      <li>Quần</li>
      <li>Giày</li>
    </ul>
  </aside>

  <main>
    <h2>Sản phẩm</h2>
    <div class="products" id="productContainer"></div>
  </main>

  <aside class="cartBox">
    <h3>🛒 Giỏ hàng</h3>
    <ul id="cart"></ul>
    <p id="total"></p>

    <input type="text" id="customerName" placeholder="Tên">
    <input type="text" id="customerPhone" placeholder="SĐT">
    <button onclick="checkout()">Thanh toán</button>
  </aside>

</div>

<script src="js/script.js"></script>
</body>
</html>

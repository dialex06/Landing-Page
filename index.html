<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Test UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Shop Demo</h1>

<!-- Slider -->
<div class="slider">
  <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500">
</div>

<!-- Controls -->
<div class="controls">
  <button>Tất cả</button>
  <button>Áo</button>
  <button>Quần</button>
  <input placeholder="Tìm sản phẩm...">
</div>

<!-- Products -->
<div class="products">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400">
    <h4>Áo thun</h4>
    <p>120,000đ</p>
    <button>Thêm</button>
    <button class="detailsBtn">Chi tiết</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400">
    <h4>Quần jeans</h4>
    <p>300,000đ</p>
    <button>Thêm</button>
    <button class="detailsBtn">Chi tiết</button>
  </div>
</div>

<!-- Cart -->
<h3>🛒 Giỏ hàng</h3>
<ul id="cart">
  <li>Áo thun - 120,000đ</li>
</ul>

<button id="checkoutBtn">Thanh toán</button>

</body>
</html>

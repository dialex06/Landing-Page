<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>CHÀO MỪNG ĐẾN FASHION JET JET VIP NHẤT VIỆT NAM</h1>
  </header>

  <!-- Slider -->
  <div class="slider">
    <img id="slide" src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=1400&q=80">
  </div>

  <!-- Filter & Search -->
  <div class="controls">
    <button onclick="filterCategory('all')">Tất cả</button>
    <button onclick="filterCategory('ao')">Áo</button>
    <button onclick="filterCategory('quan')">Quần</button>
    <input type="text" id="searchInput" placeholder="Tìm kiếm..." onkeyup="searchProduct()">
  </div>

  <!-- Sản phẩm -->
  <div class="products" id="productContainer"></div>

  <!-- Giỏ hàng -->
  <div class="cart-box">
    <h2>🛒 Giỏ hàng</h2>
    <ul id="cart"></ul>
    <p id="total">0 VNĐ</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
